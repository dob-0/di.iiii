name: Publish cPanel Release (Canonical)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source branch or ref to build from
        required: true
        default: dev
      deploy_env:
        description: Target prebuilt environment branch
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_env }}
    env:
      SOURCE_REF: ${{ inputs.source_ref }}
      DEPLOY_ENV: ${{ inputs.deploy_env }}
      TARGET_BRANCH: ${{ inputs.deploy_env == 'staging' && 'cpanel-staging' || 'cpanel-production' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: |
          if [ -f serverXR/package-lock.json ]; then
            npm --prefix serverXR ci
          else
            npm --prefix serverXR install
          fi

      - name: Run automated tests
        run: npm test

      - name: Stage cPanel release
        env:
          VITE_API_BASE_URL: /serverXR
          VITE_API_TOKEN: ${{ secrets.SERVERXR_API_TOKEN }}
        run: node scripts/stage-cpanel-nodeapp-release.mjs

      - name: Publish target branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PUBLISH_DIR="$(mktemp -d)"
          rsync -az \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='serverXR/node_modules' \
            --exclude='dist' \
            --exclude='.deploy' \
            ./ "${PUBLISH_DIR}/"
          mkdir -p "${PUBLISH_DIR}/.deploy"
          cp -R .deploy/cpanel "${PUBLISH_DIR}/.deploy/cpanel"
          cp deploy/cpanel/cpanel.prebuilt.yml "${PUBLISH_DIR}/.cpanel.yml"
          rm -f "${PUBLISH_DIR}/deploy/cpanel/cpanel.prebuilt.yml"
          printf '%s\n' "${SOURCE_REF}" > "${PUBLISH_DIR}/.cpanel-source-ref"
          printf '%s\n' "${DEPLOY_ENV}" > "${PUBLISH_DIR}/.cpanel-deploy-env"
          cd "${PUBLISH_DIR}"
          git init
          git checkout -b "${TARGET_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .
          git add -f .deploy .cpanel.yml .cpanel-source-ref .cpanel-deploy-env
          git commit -m "Publish ${DEPLOY_ENV} cPanel prebuilt from ${SOURCE_REF}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "${TARGET_BRANCH}"
