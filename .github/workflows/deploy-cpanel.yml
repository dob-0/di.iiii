name: Deploy cPanel

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to production
        required: false
        default: main

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'staging' || 'production' }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'push' && 'staging' || 'production' }}
      TARGET_REF: ${{ github.event_name == 'push' && github.sha || inputs.ref }}
      SMOKE_BASE_URL: ${{ github.event_name == 'push' && 'https://staging.di-studio.xyz' || 'https://di-studio.xyz' }}
      SERVER_PORT: ${{ github.event_name == 'push' && '4001' || '4000' }}
      SERVER_CORS_ORIGINS: ${{ github.event_name == 'push' && 'https://staging.di-studio.xyz' || 'https://di-studio.xyz,https://www.di-studio.xyz' }}
      SERVER_APP_BASE_PATH: /serverXR
      SERVER_DATA_ROOT: ${{ format('{0}/data', secrets.CPANEL_SERVERXR_ROOT) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Verify production ref is on main
        if: env.DEPLOY_ENV == 'production'
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix serverXR ci

      - name: Run automated tests
        run: npm test

      - name: Stage cPanel release
        env:
          VITE_API_BASE_URL: /serverXR
          VITE_API_TOKEN: ${{ secrets.SERVERXR_API_TOKEN }}
        run: node scripts/stage-cpanel-nodeapp-release.mjs

      - name: Upload staged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpanel-release-${{ env.DEPLOY_ENV }}
          path: .deploy/cpanel

      - name: Generate server environment file
        env:
          OUTPUT_PATH: .deploy/cpanel/serverXR/.env.generated
          NODE_ENV: production
          PORT: ${{ env.SERVER_PORT }}
          APP_BASE_PATH: ${{ env.SERVER_APP_BASE_PATH }}
          DATA_ROOT: ${{ env.SERVER_DATA_ROOT }}
          API_TOKEN: ${{ secrets.SERVERXR_API_TOKEN }}
          REQUIRE_AUTH: true
          CORS_ORIGINS: ${{ env.SERVER_CORS_ORIGINS }}
          MAX_UPLOAD_MB: 100
        run: node scripts/write-server-env.mjs --output "$OUTPUT_PATH"

      - name: Prepare SSH
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$CPANEL_SSH_KEY" > ~/.ssh/cpanel_key
          chmod 600 ~/.ssh/cpanel_key
          ssh-keyscan -p "${CPANEL_PORT:-22}" -H "$CPANEL_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target directories exist
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_WEB_ROOT: ${{ secrets.CPANEL_WEB_ROOT }}
          CPANEL_SERVERXR_ROOT: ${{ secrets.CPANEL_SERVERXR_ROOT }}
          CPANEL_SHARED_ROOT: ${{ secrets.CPANEL_SHARED_ROOT }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_PORT:-22}" "${CPANEL_USERNAME}@${CPANEL_HOST}" \
            "mkdir -p '${CPANEL_WEB_ROOT}' '${CPANEL_SERVERXR_ROOT}' '${CPANEL_SHARED_ROOT}'"

      - name: Backup current production release
        if: env.DEPLOY_ENV == 'production'
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_WEB_ROOT: ${{ secrets.CPANEL_WEB_ROOT }}
          CPANEL_SERVERXR_ROOT: ${{ secrets.CPANEL_SERVERXR_ROOT }}
          CPANEL_SHARED_ROOT: ${{ secrets.CPANEL_SHARED_ROOT }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_PORT:-22}" "${CPANEL_USERNAME}@${CPANEL_HOST}" <<EOF
          set -euo pipefail
          TIMESTAMP="\$(date +%Y%m%d-%H%M%S)"
          BACKUP_ROOT="\${HOME}/deploy-backups/\${TIMESTAMP}-production"
          mkdir -p "\${BACKUP_ROOT}"
          if [ -d "${CPANEL_WEB_ROOT}" ]; then
            tar -czf "\${BACKUP_ROOT}/public_html.tar.gz" -C "${CPANEL_WEB_ROOT}" .
          fi
          if [ -d "${CPANEL_SERVERXR_ROOT}" ]; then
            tar -czf "\${BACKUP_ROOT}/serverXR.tar.gz" -C "${CPANEL_SERVERXR_ROOT}" .
          fi
          if [ -d "${CPANEL_SHARED_ROOT}" ]; then
            tar -czf "\${BACKUP_ROOT}/shared.tar.gz" -C "${CPANEL_SHARED_ROOT}" .
          fi
          echo "Backup created in \${BACKUP_ROOT}"
          EOF

      - name: Sync public web root
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_WEB_ROOT: ${{ secrets.CPANEL_WEB_ROOT }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/cpanel_key -p ${CPANEL_PORT:-22}" \
            .deploy/cpanel/public_html/ \
            "${CPANEL_USERNAME}@${CPANEL_HOST}:${CPANEL_WEB_ROOT}/"

      - name: Sync backend app
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_SERVERXR_ROOT: ${{ secrets.CPANEL_SERVERXR_ROOT }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.env.generated' \
            --exclude='data' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/cpanel_key -p ${CPANEL_PORT:-22}" \
            .deploy/cpanel/serverXR/ \
            "${CPANEL_USERNAME}@${CPANEL_HOST}:${CPANEL_SERVERXR_ROOT}/"

      - name: Sync shared schemas
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_SHARED_ROOT: ${{ secrets.CPANEL_SHARED_ROOT }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/cpanel_key -p ${CPANEL_PORT:-22}" \
            .deploy/cpanel/shared/ \
            "${CPANEL_USERNAME}@${CPANEL_HOST}:${CPANEL_SHARED_ROOT}/"

      - name: Sync backend environment file
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_SERVERXR_ROOT: ${{ secrets.CPANEL_SERVERXR_ROOT }}
        run: |
          set -euo pipefail
          rsync -az \
            -e "ssh -i ~/.ssh/cpanel_key -p ${CPANEL_PORT:-22}" \
            .deploy/cpanel/serverXR/.env.generated \
            "${CPANEL_USERNAME}@${CPANEL_HOST}:${CPANEL_SERVERXR_ROOT}/.env"

      - name: Install dependencies and restart cPanel Node.js App
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_SERVERXR_ROOT: ${{ secrets.CPANEL_SERVERXR_ROOT }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cpanel_key -p "${CPANEL_PORT:-22}" "${CPANEL_USERNAME}@${CPANEL_HOST}" <<EOF
          set -euo pipefail
          CPANEL_SERVERXR_ROOT="${CPANEL_SERVERXR_ROOT}"
          CPANEL_USERNAME="${CPANEL_USERNAME}"
          cd "\${CPANEL_SERVERXR_ROOT}"
          npm install --production
          if ! command -v cloudlinux-selector >/dev/null 2>&1; then
            echo "cloudlinux-selector is not installed on the target server." >&2
            exit 1
          fi
          APP_ROOT_REL="\${CPANEL_SERVERXR_ROOT#\${HOME}/}"
          if [ "\${APP_ROOT_REL}" = "\${CPANEL_SERVERXR_ROOT}" ]; then
            APP_ROOT_REL="\${CPANEL_SERVERXR_ROOT#/home/\${CPANEL_USERNAME}/}"
          fi
          cloudlinux-selector restart --json --interpreter nodejs --user "\${CPANEL_USERNAME}" --app-root "\${APP_ROOT_REL}"
          EOF

      - name: Smoke check deployed environment
        run: node scripts/smoke-check-cpanel.mjs --base-url "${SMOKE_BASE_URL}" --output ".deploy/checkpoints/${DEPLOY_ENV}-smoke.json"

      - name: Record deploy checkpoint
        run: |
          set -euo pipefail
          if [ "${DEPLOY_ENV}" = 'staging' ]; then
            NOTE="Auto staging deploy from dev (${GITHUB_SHA})"
          else
            NOTE="Manual production deploy from ${TARGET_REF}"
          fi
          node scripts/create-checkpoint.mjs \
            --environment "${DEPLOY_ENV}" \
            --release ".deploy/cpanel/release.json" \
            --smoke ".deploy/checkpoints/${DEPLOY_ENV}-smoke.json" \
            --output-dir ".deploy/checkpoints" \
            --note "${NOTE}"

      - name: Upload deploy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostics-${{ env.DEPLOY_ENV }}
          path: |
            .deploy/cpanel/release.json
            .deploy/checkpoints
