name: Auto PR staging→main

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR from staging to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const head = 'staging';
            const base = 'main';
            const title = 'Auto PR: staging → main';
            const body = [
              'Summary: Promote the latest staging-verified work into production.',
              '',
              'Expected path:',
              '1. verify staging is healthy',
              '2. review the staged changes',
              '3. merge into main only when ready for production'
            ].join('\n');

            async function run() {
              try {
                const prs = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open',
                  head: `${owner}:${head}`,
                  base,
                });
                if (prs.data && prs.data.length > 0) {
                  core.info(`PR already exists: ${prs.data[0].html_url}`);
                  return;
                }
                const res = await github.rest.pulls.create({ owner, repo, title, head, base, body, maintainer_can_modify: true });
                core.info(`Created PR: ${res.data.html_url}`);
              } catch (err) {
                core.setFailed(`Failed to create PR: ${err.message}`);
              }
            }

            await run();
