name: Release Bundles

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stage cPanel release
        run: npm run deploy:cpanel

      - name: Zip dist
        run: |
          cd .deploy/cpanel/public_html
          zip -r ../../../dist.zip .

      - name: Zip cPanel release
        run: |
          cd .deploy/cpanel
          zip -r ../../cpanel-release.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist.zip
            cpanel-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
